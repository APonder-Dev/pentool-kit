name: Release

# Fires when you push a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # create the GitHub Release
  packages: write        # push the container image to GHCR
  id-token: write        # PyPI Trusted Publishing (OIDC, no token needed)

jobs:
  # 1) Build sdist + wheel once and attach them to the Release.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  # 2) Create the GitHub Release with auto-generated notes + built artifacts.
  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*

  # 3) Publish to PyPI via Trusted Publishing.
  #    Prerequisite: configure a "pending publisher" on PyPI for this repo/workflow
  #    (see RELEASING.md). Runs independently; failure here won't block the others.
  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # 4) Build and push the container image to GitHub Container Registry.
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
